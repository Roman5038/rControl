    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #00e676; 
            --off-color: #555555;
            --danger-color: #cf6679;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 2px;
            color: aquamarine;
        }

        .relay-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .relay-info {
            display: flex;
            flex-direction: column;
        }

        .relay-name {
            font-size: 1.2em;
            font-weight: bold;
            color: aqua;
        }

        .relay-status {
            font-size: 0.9em;
            color: #aaa;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--off-color);
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent-color);
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>УПРАВЛЕНИЕ</h2>

    <!-- Реле 1 -->
    <div class="relay-item">
        <div class="relay-info">
            <span class="relay-name">Въезд</span>
            <span class="relay-status" id="status1">Выключено</span>
        </div>
        <label class="switch">
            <input type="checkbox" id="relay1" onclick="toggleRelay(1)">
            <span class="slider"></span>
        </label>
    </div>

    <!-- Реле 2 -->
    <div class="relay-item">
        <div class="relay-info">
            <span class="relay-name">Фасад</span>
            <span class="relay-status" id="status2">Выключено</span>
        </div>
        <label class="switch">
            <input type="checkbox" id="relay2" onclick="toggleRelay(2)">
            <span class="slider"></span>
        </label>
    </div>
</div>

<script>
    function toggleRelay(id) {
        var checkbox = document.getElementById('relay' + id);
        var statusText = document.getElementById('status' + id);
        
        if (checkbox.checked) {
            statusText.innerText = "Включено";
            statusText.style.color = "var(--accent-color)";
            console.log('Relay ' + id + ' ON');
        } else {
            statusText.innerText = "Выключено";
            statusText.style.color = "#aaa";
            console.log('Relay ' + id + ' OFF');
        }
    }
</script>

</body>
</html>
